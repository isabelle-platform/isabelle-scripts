server {
    listen <srv_port>;
    server_name <pub_fqdn>;
    root <root_folder>;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        application/wasm
        application/javascript
        application/json
        text/css
        text/plain
        image/svg+xml;

    location ~ \.(wasm|js|css)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        gzip_static on;
    }

    location ~ ^\/(?!(api|.*\.wasm$|.*\.png$|.*\.css$|.*\.js$)) {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "must-revalidate, max-age=3600";
    }

    location ^~ /api {
        rewrite            /api/(.*) /$1  break;
        proxy_pass         http://localhost:<core_port>;
        proxy_redirect     off;
        proxy_set_header   Host $host;
    }

    include /etc/nginx/isabelle/extra-location-*.conf;
}
